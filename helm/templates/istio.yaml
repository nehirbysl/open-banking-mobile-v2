---
# VirtualService — uses existing gw-tnd-bankdhofar-com gateway in istio-system
# Single host: qantara.tnd.bankdhofar.com, path-based routing
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: qantara
  namespace: {{ .Values.global.namespace }}
spec:
  hosts:
    - {{ .Values.global.domain }}
  gateways:
    - istio-system/gw-tnd-bankdhofar-com
  http:
    # OBIE API endpoints → ob-api-server
    - match:
        - uri:
            prefix: /open-banking/
      route:
        - destination:
            host: ob-api-server.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 8000
      headers:
        response:
          remove:
            - x-envoy-upstream-service-time
            - server
      timeout: 30s

    # TPP Manager API → ob-tpp-manager
    - match:
        - uri:
            prefix: /portal-api/
      route:
        - destination:
            host: ob-tpp-manager.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 8000
      timeout: 15s

    # Webhook callbacks → ob-event-service
    - match:
        - uri:
            prefix: /webhooks/
      route:
        - destination:
            host: ob-event-service.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 8000
      timeout: 10s

    # Health check passthrough
    - match:
        - uri:
            exact: /health
      route:
        - destination:
            host: ob-api-server.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 8000

    # Swagger/Redoc docs
    - match:
        - uri:
            prefix: /docs
        - uri:
            prefix: /redoc
        - uri:
            prefix: /openapi.json
      route:
        - destination:
            host: ob-api-server.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 8000

    # Everything else → portal SPA
    - route:
        - destination:
            host: ob-portal.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: 10s
