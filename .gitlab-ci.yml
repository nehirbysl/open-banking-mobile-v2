stages:
  - build

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

.build_template: &build_template
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]

build-ob-api-server:
  <<: *build_template
  script:
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}/services/ob-api-server"
      --dockerfile "${CI_PROJECT_DIR}/services/ob-api-server/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ob-api-server:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ob-api-server:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - services/ob-api-server/**/*

build-ob-consent-service:
  <<: *build_template
  script:
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}/services/ob-consent-service"
      --dockerfile "${CI_PROJECT_DIR}/services/ob-consent-service/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ob-consent-service:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ob-consent-service:latest"
