      /kaniko/executor
      --context "${CI_PROJECT_DIR}/services/ob-loan-service"
      --dockerfile "${CI_PROJECT_DIR}/services/ob-loan-service/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ob-loan-service:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ob-loan-service:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - services/ob-loan-service/**/*
    - if: $CI_COMMIT_BRANCH =~ /^feature\/auto-loan/
      changes:
        - services/ob-loan-service/**/*

